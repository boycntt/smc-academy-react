services:
  - type: web
    name: smc-academy
    runtime: node
    plan: free
    buildCommand: |
      npm install
      cd client && npm install && npm run build && cd ..
      cp -r client/dist server/public
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: true
    healthCheckPath: /api/health
