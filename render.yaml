services:
  - type: web
    name: smc-academy
    runtime: node
    plan: free
    buildCommand: |
      npm install
      cd client
      npm install
      npm run build
      cd ..
      ls -la client/dist/
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: true
    healthCheckPath: /api/health
